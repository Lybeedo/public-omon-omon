version: '3.8'

# ============================================================
# VicChelenge System - Docker Compose
# ============================================================
# Deployment for Coolify on Contabo VPS
# NO MARTINGALE. NO GRID. PURE AI TRADING.
# ============================================================

services:

  # ================================================
  # nexus-api: Central Backend
  # ================================================
  nexus-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.nexus-api
    container_name: nexus-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - NEXUS_DB=/data/nexus.db
      - TZ=UTC
    volumes:
      - nexus-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - nexus-net

  # ================================================
  # nexus-regime: Market Regime Detection
  # ================================================
  nexus-regime:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.nexus-regime
    container_name: nexus-regime
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - TZ=UTC
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - nexus-net

  # ================================================
  # nexus-llm: AI Analysis Engine (OpenRouter)
  # ================================================
  nexus-llm:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.nexus-llm
    container_name: nexus-llm
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - TZ=UTC
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - nexus-net

  # ================================================
  # nexus-optimizer: Genetic Algorithm Engine
  # ================================================
  nexus-optimizer:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.nexus-optimizer
    container_name: nexus-optimizer
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      - TZ=UTC
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 60s
      timeout: 10s
      retries: 3
    networks:
      - nexus-net

  # ================================================
  # nexus-dashboard: Web Monitor
  # ================================================
  nexus-dashboard:
    image: nginx:alpine
    container_name: nexus-dashboard
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./nexus-dashboard:/usr/share/nginx/html:ro
    environment:
      - TZ=UTC
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - nexus-net

  # ================================================
  # Caddy: Reverse Proxy with Auto-HTTPS
  # ================================================
  caddy:
    image: caddy:alpine
    container_name: nexus-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
    environment:
      - TZ=UTC
    networks:
      - nexus-net
    depends_on:
      - nexus-api
      - nexus-regime
      - nexus-llm
      - nexus-optimizer
      - nexus-dashboard

# ================================================
# NETWORKS
# ================================================
networks:
  nexus-net:
    driver: bridge

# ================================================
# VOLUMES
# ================================================
volumes:
  nexus-data:
  caddy-data: