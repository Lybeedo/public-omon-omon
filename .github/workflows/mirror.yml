name: Mirror to Collection
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout omon-omon
        uses: actions/checkout@v4
        with:
          repository: Lybeedo/public-omon-omon
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 1

      - name: Clone public-collection repo
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git clone https://x-access-token:$GH_PAT@github.com/Lybeedo/public-collection.git collection
          cd collection
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --ff-only 2>/dev/null || true

      - name: Mirror files with YYMMDD-HHMM prefix
        run: |
          TS=$(date +%y%m%d-%H%M)
          SOURCE="."
          echo "=== TIMESTAMP PREFIX: $TS ==="
          echo "=== Mirroring all files in repository ==="
          find . -type f ! -path './.git/*' ! -name '.git' | sed 's|^\./||' | sort | while IFS= read -r filepath; do
            [ -z "$filepath" ] && continue
            new_filename="${TS}_$(basename "$filepath")"
            dest_dir="collection/$(dirname "$filepath")"
            mkdir -p "$dest_dir"
            cp "$filepath" "$dest_dir/$new_filename"
            echo "  COPIED: $filepath -> $dest_dir/$new_filename"
          done
          echo ""
          echo "=== Deleted files: SKIPPED (preserved in collection) ==="

      - name: Commit and push to public-collection
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          cd collection
          git add -A
          if git diff --cached --quiet; then
            echo "No new files to push."
          else
            COUNT=$(git diff --cached --name-only | wc -l)
            git commit -m "Mirror $(date +%y%m%d-%H%M) — $COUNT file(s)"
            git push origin main
            echo "Pushed to public-collection ($COUNT files)."
          fi
